kind = "web"
previewPath = "/"
title = "VPS Management Panel"
version = "1.0.0"
id = "artifacts/vps-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20866

[services.development]
run = "pnpm --filter @workspace/vps-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vps-panel", "run", "build" ]
publicDir = "artifacts/vps-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20866"
BASE_PATH = "/"
